# Render Blueprint Specification for Saudi Kayan PC Dashboard
services:
  - type: web
    name: saudi-kayan-pc-digital-twin
    runtime: static
    buildCommand: ""  # Static site, no build steps required
    staticPublishPath: "."  # Serve files from the root of the repository (where index.html is located)
    headers:
      - path: /*
        name: Cache-Control
        value: "public, max-age=3600"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
