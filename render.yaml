# Render Blueprint Specification for Saudi Kayan PC Dashboard
services:
  - type: web
    name: saudi-kayan-pc-digital-twin
    env: static
    buildCommand: ""  # Static site, no build steps required
    publishPath: "./polycarbonate_plant_efficiency"   # Serve files from the subdirectory
    headers:
      - path: /*
        name: Cache-Control
        value: "public, max-age=3600"
    routes:
      - from: /*
        to: /index.html
